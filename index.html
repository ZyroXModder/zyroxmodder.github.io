<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZyroX Ultimate Hook Gen v12.5</title>
    <style>
        :root { --neon: #00ff41; --bg: #0d0d0d; --card: #1a1a1a; --pink: #ff00ff; }
        body { background: var(--bg); color: #ccc; font-family: 'Consolas', monospace; padding: 10px; }
        .container { background: var(--card); border: 1px solid #333; padding: 20px; border-radius: 12px; max-width: 900px; margin: auto; box-shadow: 0 0 25px rgba(0,255,65,0.1); }
        h2 { color: var(--neon); text-align: center; text-transform: uppercase; font-size: 1.1rem; border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
        .full { grid-column: span 3; background: #222; padding: 12px; border-radius: 6px; border-left: 4px solid var(--pink); }
        label { display: block; font-size: 10px; color: var(--neon); margin-bottom: 4px; font-weight: bold; text-transform: uppercase; }
        input, select { width: 100%; padding: 10px; background: #252525; border: 1px solid #444; color: #fff; border-radius: 4px; outline: none; box-sizing: border-box; }
        button#genBtn { width: 100%; padding: 15px; background: var(--neon); color: #000; border: none; cursor: pointer; font-weight: 900; border-radius: 6px; margin-top: 20px; text-transform: uppercase; transition: 0.3s; }
        button#genBtn:hover { background: #00cc33; box-shadow: 0 0 15px rgba(0,255,65,0.4); }
        .output-box { margin-top: 20px; display: none; }
        .box-container { position: relative; margin-bottom: 20px; }
        pre { background: #000; padding: 15px; border-radius: 6px; border: 1px solid #333; color: #00ff41; overflow-x: auto; font-size: 11px; line-height: 1.5; border-left: 3px solid var(--neon); margin: 0; }
        .copy-btn { position: absolute; top: 8px; right: 8px; background: #333; color: #fff; padding: 5px 10px; font-size: 10px; border: 1px solid #555; cursor: pointer; border-radius: 4px; z-index: 10; transition: 0.2s; }
        .copy-btn:hover { background: var(--pink); color: #fff; }
        .tag { color: var(--pink); font-size: 11px; font-weight: bold; margin-bottom: 5px; display: block; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="container">
    <h2>ZyroX Master Hook Gen (Final Fix)</h2>
    <div class="grid">
        <div class="full">
            <label>Hook Type (Execution Mode)</label>
            <select id="hookType" onchange="onUpdateUI()">
                <option value="WithUpdate">With Update (Continuous Call)</option>
                <option value="WithoutUpdate">Without Update (Direct Method Hook)</option>
            </select>
        </div>

        <div class="full">
            <label>Data Type</label>
            <select id="pType" onchange="onTypeChange()">
                <option value="int">int</option>
                <option value="float">float</option>
                <option value="long">long</option>
                <option value="bool">bool</option>
            </select>
        </div>

        <div class="full">
            <label>Menu Mode</label>
            <select id="hookMode" onchange="onModeChange()"></select>
        </div>

        <div class="full">
            <label>Hook Name</label>
            <input type="text" id="hName" placeholder="e.g. SetCoins" value="Hh">
        </div>

        <div><label>Namespace</label><input type="text" id="ns" placeholder="Optional"></div>
        <div><label>Class Name</label><input type="text" id="cls" placeholder="PlayerController"></div>
        <div><label>Method Name</label><input type="text" id="meth" placeholder="SetCoins"></div>
        
        <div><label>Param Count</label><input type="number" id="pCount" value="1" onchange="onUpdateUI()"></div>
        <div id="hookPointDiv"><label>Hook Point (Update)</label><input type="text" id="upm" value="Update"></div>
        <div><label>Menu Case #</label><input type="number" id="cNum" value="1"></div>

        <div id="minMaxBox" style="display:none; grid-column: span 3;">
            <div style="display:flex; gap:10px;">
                <div style="flex:1;"><label>Min</label><input type="number" id="minVal" value="0"></div>
                <div style="flex:1;"><label>Max</label><input type="number" id="maxVal" value="100"></div>
            </div>
        </div>

        <div id="injectBox" class="full">
            <label>Inject Value</label>
            <div id="injectInputArea"></div>
        </div>
    </div>
    
    <button id="genBtn" onclick="generate()">Generate Ultimate Code</button>

    <div class="output-box" id="output-container">
        <div class="box-container"><span class="tag">1. Hook Logic</span><button class="copy-btn" onclick="copy('outHook')">COPY</button><pre id="outHook"></pre></div>
        <div class="box-container"><span class="tag">2. Menu String</span><button class="copy-btn" onclick="copy('outObf')">COPY</button><pre id="outObf"></pre></div>
        <div class="box-container"><span class="tag">3. Menu Case</span><button class="copy-btn" onclick="copy('outCase')">COPY</button><pre id="outCase"></pre></div>
    </div>
</div>

<script>
function onTypeChange() {
    const type = document.getElementById('pType').value;
    const modeSelect = document.getElementById('hookMode');
    modeSelect.innerHTML = (type === 'bool') ? `<option value="Toggle">Toggle</option><option value="CheckBox">CheckBox</option>` : `<option value="Toggle">Toggle</option><option value="CheckBox">CheckBox</option><option value="SeekBar">SeekBar</option><option value="InputValue">InputValue</option>`;
    const area = document.getElementById('injectInputArea');
    area.innerHTML = (type === 'bool') ? `<select id="defVal"><option value="true">true</option><option value="false">false</option></select>` : `<input type="text" id="defVal" value="999">`;
    onModeChange();
}

function onModeChange() {
    const mode = document.getElementById('hookMode').value;
    document.getElementById('minMaxBox').style.display = (mode === 'SeekBar') ? 'block' : 'none';
    document.getElementById('injectBox').style.display = (mode === 'Toggle' || mode === 'CheckBox') ? 'block' : 'none';
}

function onUpdateUI() {
    const type = document.getElementById('hookType').value;
    document.getElementById('hookPointDiv').style.visibility = (type === "WithUpdate") ? "visible" : "hidden";
}

onTypeChange();
onUpdateUI();

function generate() {
    const h = document.getElementById('hName').value || "Hh";
    const cls = document.getElementById('cls').value || "Class";
    const meth = document.getElementById('meth').value || "Method";
    const ns = document.getElementById('ns').value || "";
    const pc = parseInt(document.getElementById('pCount').value);
    const upm = document.getElementById('upm').value || "Update";
    const cn = document.getElementById('cNum').value || "1";
    const type = document.getElementById('pType').value;
    const mode = document.getElementById('hookMode').value;
    const hType = document.getElementById('hookType').value;
    const injectVal = document.getElementById('defVal').value;

    const isBoolMode = (mode === "Toggle" || mode === "CheckBox");
    let varName = isBoolMode ? `Is${h}` : `${h}_Value`;
    let varType = isBoolMode ? "bool" : type;
    let finalVal = (type === 'float' && !isNaN(injectVal) && !injectVal.includes('.')) ? injectVal + ".0f" : injectVal;

    let hookCode = "";
    if (hType === "WithUpdate") {
        let hookBody = isBoolMode ? `if (${varName}) { ${h}_ptr(instance, ${finalVal}); }` : (mode === "SeekBar" ? `if (${varName} > 0) { ${h}_ptr(instance, ${varName}); }` : `${h}_ptr(instance, ${varName});`);
        hookCode = `${varType} ${varName} = ${isBoolMode ? 'false' : '0'};\n\nvoid (*${h}_ptr)(void *instance, ${type} value);\nvoid (*orig_${cls}up)(void *instance);\n\nvoid new_${cls}up(void *instance) {\n    if (instance != NULL) {\n        ${hookBody}\n    }\n    return orig_${cls}up(instance);\n}\n\n// Init:\n${h}_ptr = (void(*)(void*, ${type}))Il2CppGetMethodOffset("Assembly-CSharp.dll", "${ns}", "${cls}", "${meth}", ${pc});\nDobbyHook(Il2CppGetMethodOffset("Assembly-CSharp.dll", "${ns}", "${cls}", "${upm}", 0), (void*)new_${cls}up, (void**)&orig_${cls}up);`;
    } else {
        let paramStr = (pc > 0) ? `, ${type} value` : ``;
        let callParams = (pc > 0) ? `instance, ${isBoolMode ? finalVal : varName}` : `instance`;
        // FIXED: varType instead of static bool
        hookCode = `${varType} ${varName} = ${isBoolMode ? 'false' : '0'};\n\nvoid (*old_${h})(void *instance${paramStr});\nvoid hook_${h}(void *instance${paramStr}) {\n    if (instance != NULL) {\n        if (${isBoolMode ? varName : varName + ' != 0'}) {\n            old_${h}(${callParams});\n            return;\n        }\n    }\n    return old_${h}(instance${pc > 0 ? ', value' : ''});\n}\n\n// Init:\nDobbyHook(Il2CppGetMethodOffset("Assembly-CSharp.dll", "${ns}", "${cls}", "${meth}", ${pc}), (void*)hook_${h}, (void**)&old_${h});`;
    }

    let obfStr = `OBFUSCATE("${cn}_${mode}_${h}${mode==='SeekBar'?'_'+document.getElementById('minVal').value+'_'+document.getElementById('maxVal').value:''}"),`;
    const caseCode = `case ${cn}:\n    ${varName} = ${isBoolMode ? 'boolean' : 'value'};\n    break;`;

    document.getElementById('outHook').textContent = hookCode;
    document.getElementById('outObf').textContent = obfStr;
    document.getElementById('outCase').textContent = caseCode;
    document.getElementById('output-container').style.display = 'block';
}

function copy(id) {
    const el = document.getElementById(id);
    navigator.clipboard.writeText(el.textContent).then(() => {
        const btn = el.previousElementSibling;
        btn.innerText = "COPIED!";
        setTimeout(() => { btn.innerText = "COPY"; }, 1500);
    });
}
</script>
</body>
</html>
