<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Working TikTok Downloader</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; padding: 50px; }
        .box { background: #1e1e1e; padding: 30px; border-radius: 15px; max-width: 400px; margin: auto; }
        input { width: 90%; padding: 12px; margin-bottom: 20px; border-radius: 5px; border: none; }
        button { background: #fe2c55; color: white; border: none; padding: 12px 25px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:disabled { background: #555; }
        #downloadArea { margin-top: 20px; display: none; }
        .dl-btn { background: #25d366; text-decoration: none; display: inline-block; padding: 10px; border-radius: 5px; color: white; margin-top: 10px; }
    </style>
</head>
<body>

<div class="box">
    <h2>TikTok Downloader</h2>
    <input type="text" id="videoUrl" placeholder="Paste link here...">
    <br>
    <button id="mainBtn" onclick="fetchVideo()">Get Video</button>

    <div id="downloadArea">
        <p>Video Ready!</p>
        <a id="videoLink" href="" target="_blank" class="dl-btn">Download No Watermark</a>
    </div>
</div>

<script>
    async function fetchVideo() {
        const url = document.getElementById('videoUrl').value;
        const btn = document.getElementById('mainBtn');
        const area = document.getElementById('downloadArea');
        const dlLink = document.getElementById('videoLink');

        if(!url) return alert("Link halnuhos!");

        btn.innerText = "Checking...";
        btn.disabled = true;

        try {
            // Updated API call (Stable)
            const res = await fetch(`https://www.tikwm.com/api/?url=${encodeURIComponent(url)}`);
            const data = await res.json();

            if(data.code === 0) {
                // Real Video URL milo!
                dlLink.href = "https://www.tikwm.com" + data.data.play;
                area.style.display = "block";
                btn.innerText = "Success!";
            } else {
                alert("Video bhetिएन, link check garnuhos.");
            }
        } catch (e) {
            alert("Connection Error! Internet check garnuhos ya VPN off garnuhos.");
        } finally {
            btn.disabled = false;
            if(btn.innerText !== "Success!") btn.innerText = "Get Video";
        }
    }
</script>

</body>
</html>
